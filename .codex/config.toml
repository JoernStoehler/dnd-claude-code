# Codex CLI project config for the dnd-claude-code repo.
#
# How Codex finds this file (no symlinks, no env vars):
# - Codex walks from the git project root DOWN to the current working
#   directory, reading every .codex/config.toml it encounters. Closest to
#   cwd wins on key conflicts. This file is at the project root so its
#   settings apply repo-wide unless a deeper .codex/config.toml overrides.
# - The walk only runs when the project is trusted. Trust is set in the
#   machine-local ~/.codex/config.toml via
#     [projects."/workspaces/dnd-claude-code"]
#     trust_level = "trusted"
#   which .devcontainer/post-create.sh seeds idempotently on rebuild.
#
# Runtime state (auth.json, history, sessions, log/) lives in ~/.codex/,
# which is bind-mounted from /srv/devhome/.codex/ on the host. It is never
# inside any git tree, so auth tokens cannot be accidentally committed.

# AGENTS.md is small today but may grow, and agents may also read campaign
# skills under `.agents/skills/*/SKILL.md` during a session.
# Bump well above the 32 KiB default just in case.
project_doc_max_bytes = 65536

# Security
sandbox_mode = "danger-full-access"
approval_policy = "on-request"
web_search = "live"

# We pick a default profile
profile = "code"

file_opener = "vscode"
[tui]
theme = "github"
terminal_title = ["spinner", "thread"]
status_line = ["model-with-reasoning", "context-usage", "five-hour-limit"]

[features]
apps = false
shell_snapshot = true

# Subagents: we allow recursion
[agents]
max_threads = 20
max_depth = 2
job_max_runtime_seconds = 3600

# Used for coding tasks.
# Model and reasoning-budget choices live in ~/.codex/config.toml so the
# VS Code Codex picker remains the source of truth for this machine.
[profiles.code]
model_reasoning_summary = "none"
model_verbosity = "low"
personality = "pragmatic"
approval_policy = "never"

# Used for writing tasks.
# Do not pin model, model_reasoning_effort, or plan_mode_reasoning_effort
# here; those are user-local preferences for the active Codex client.
[profiles.write]
model_reasoning_summary = "detailed"
model_verbosity = "high"
personality = "pragmatic"

# Force Git subprocesses to stay non-interactive.
[shell_environment_policy.set]
GCM_INTERACTIVE = "Never"
GIT_ASKPASS = "/bin/true"
GIT_EDITOR = "true"
GIT_PAGER = "cat"
GIT_SSH_COMMAND = "ssh -oBatchMode=yes"
GIT_TERMINAL_PROMPT = "0"

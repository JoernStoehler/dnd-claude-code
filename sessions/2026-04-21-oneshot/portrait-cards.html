<!DOCTYPE html>
<html><head><meta charset='utf-8'><title>Portrait Cards</title>
<style>
  @page { size: A4 portrait; margin: 5mm; }
  body { margin: 0; padding: 0; font-size: 0; }
  table { width: 200mm; border-collapse: collapse; page-break-after: always; }
  table:last-child { page-break-after: auto; }
  td.card { width: 100mm; height: 71mm; border: 0.3mm dashed #aaa; vertical-align: top; padding: 0; overflow: hidden; }
  td.card .inner { display: flex; height: 100%; }
  td.card .portrait { width: 48mm; height: 71mm; flex-shrink: 0; }
  td.card img { display: block; width: 48mm; height: 71mm; object-fit: contain; object-position: top center; }
  td.card .text { flex: 1; border-left: 0.2mm solid #ccc; padding: 1mm 2mm; }
  td.card .name { height: 7mm; border-bottom: 0.2mm solid #ccc; font-size: 10pt; font-family: sans-serif; font-weight: bold; padding: 1mm; }
  td.blank { width: 100mm; height: 71mm; border: 0.3mm dashed #aaa; vertical-align: top; padding: 0; }
</style></head><body>
<table>
  <tr>
    <td class="card"><div class="inner"><div class="portrait"><img src="portraits-grey/comic-g3.0.png"></div><div class="text"><div class="name">comic-g3.0</div></div></div></td>
    <td class="card"><div class="inner"><div class="portrait"><img src="portraits-grey/comic-g5.0.png"></div><div class="text"><div class="name">comic-g5.0</div></div></div></td>
  </tr>
  <tr>
    <td class="card"><div class="inner"><div class="portrait"><img src="portraits-grey/inkwash-g3.0.png"></div><div class="text"><div class="name">inkwash-g3.0</div></div></div></td>
    <td class="card"><div class="inner"><div class="portrait"><img src="portraits-grey/inkwash-g5.0.png"></div><div class="text"><div class="name">inkwash-g5.0</div></div></div></td>
  </tr>
  <tr>
    <td class="card"><div class="inner"><div class="portrait"><img src="portraits-grey/ligneclaire-g3.0.png"></div><div class="text"><div class="name">ligneclaire-g3.0</div></div></div></td>
    <td class="card"><div class="inner"><div class="portrait"><img src="portraits-grey/ligneclaire-g5.0.png"></div><div class="text"><div class="name">ligneclaire-g5.0</div></div></div></td>
  </tr>
  <tr>
    <td class="card"><div class="inner"><div class="portrait"><img src="portraits-grey/penink-g3.0.png"></div><div class="text"><div class="name">penink-g3.0</div></div></div></td>
    <td class="card"><div class="inner"><div class="portrait"><img src="portraits-grey/penink-g5.0.png"></div><div class="text"><div class="name">penink-g5.0</div></div></div></td>
  </tr>
</table>
</body></html>
